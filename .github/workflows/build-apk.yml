name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗 Install NDK & CMake
        run: |
          sdkmanager "ndk;27.1.12297006"
          sdkmanager "cmake;3.22.1"

      - name: 🏗 Setup EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏗 Prebuild Android
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: 📥 Download ffmpeg-kit AAR (self-hosted mirror)
        run: |
          mkdir -p android/libs
          curl -fL -o android/libs/ffmpeg-kit-full-gpl.aar \
            https://github.com/NooruddinLakhani/ffmpeg-kit-full-gpl/releases/download/v1.0.0/ffmpeg-kit-full-gpl.aar
          echo "AAR size: $(du -sh android/libs/ffmpeg-kit-full-gpl.aar)"

      - name: 🔧 Patch ffmpeg-kit-react-native — use local AAR
        run: |
          GRADLE="node_modules/ffmpeg-kit-react-native/android/build.gradle"

          python3 - <<'EOF'
          with open('node_modules/ffmpeg-kit-react-native/android/build.gradle', 'r') as f:
              content = f.read()

          # 1. Add flatDir to the repositories block inside this library's build.gradle
          if 'flatDir' not in content:
              content = content.replace(
                  'repositories {',
                  'repositories {\n  flatDir { dirs "$rootDir/libs" }',
                  1  # only first occurrence
              )

          # 2. Replace the remote arthenica AAR dependency with local flatDir AAR
          import re
          content = re.sub(
              r"implementation\s+'com\.arthenica:ffmpeg-kit-[^']*'",
              "implementation(name: 'ffmpeg-kit-full-gpl', ext: 'aar')",
              content
          )

          # 3. Fix react-native dynamic version (+) which causes plus() error
          content = content.replace(
              "api 'com.facebook.react:react-native:+'",
              "api 'com.facebook.react:react-native:0.81.5'"
          )

          with open('node_modules/ffmpeg-kit-react-native/android/build.gradle', 'w') as f:
              f.write(content)

          print("Patched ffmpeg-kit-react-native/android/build.gradle")
          EOF

          echo "--- Patched result ---"
          grep -n "flatDir\|ffmpeg-kit\|react-native" node_modules/ffmpeg-kit-react-native/android/build.gradle | head -20

      - name: 🔧 Patch android/app/build.gradle — add flatDir + smart-exception
        run: |
          GRADLE="android/app/build.gradle"
          echo "--- Original android block ---"
          grep -n "android {" "$GRADLE" | head -3

          # Add flatDir repo inside android block
          python3 - <<'EOF'
          import re

          with open('android/app/build.gradle', 'r') as f:
              content = f.read()

          # Add flatDir to repositories if not already present
          if 'flatDir' not in content:
              content = content.replace(
                  'android {',
                  'android {\n    repositories {\n        flatDir { dirs "$rootDir/libs" }\n    }',
                  1
              )

          # Add smart-exception-java to dependencies if not already present
          if 'smart-exception-java' not in content:
              content = content.replace(
                  'dependencies {',
                  "dependencies {\n    implementation 'com.arthenica:smart-exception-java:0.2.1'",
                  1
              )

          with open('android/app/build.gradle', 'w') as f:
              f.write(content)

          print("Patched android/app/build.gradle")
          EOF

      - name: 🔧 Patch android/build.gradle — add flatDir to allprojects
        run: |
          python3 - <<'EOF'
          with open('android/build.gradle', 'r') as f:
              content = f.read()

          if 'flatDir' not in content:
              content = content.replace(
                  'mavenCentral()',
                  'mavenCentral()\n        flatDir { dirs "$rootDir/libs" }',
                  1
              )

          with open('android/build.gradle', 'w') as f:
              f.write(content)

          print("Patched android/build.gradle")
          EOF

      - name: 🔍 Verify patches
        run: |
          echo "=== node_modules/ffmpeg-kit-react-native/android/build.gradle ==="
          grep -n "ffmpeg-kit\|flatDir\|smart-exception" node_modules/ffmpeg-kit-react-native/android/build.gradle || true
          echo "=== android/app/build.gradle (first 60 lines) ==="
          head -60 android/app/build.gradle
          echo "=== android/build.gradle ==="
          grep -n "flatDir\|mavenCentral" android/build.gradle || true

      - name: 🚀 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon -x lint --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duarecorder-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

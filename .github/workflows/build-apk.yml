name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: 🏗 Checkout repo
        uses: actions/checkout@v4

      - name: 🏗 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 🏗 Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 🏗 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗 Install NDK & CMake
        run: |
          sdkmanager "ndk;27.1.12297006"
          sdkmanager "cmake;3.22.1"

      - name: 🏗 Setup EAS CLI
        run: npm install -g eas-cli

      - name: 📦 Install dependencies
        run: bun install

      - name: 🏗 Prebuild Android (generate native project)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bunx expo prebuild --platform android --clean --non-interactive

      - name: 📥 Download ffmpeg-kit AAR (self-hosted mirror)
        run: |
          mkdir -p android/libs
          curl -L -o android/libs/ffmpeg-kit-full-gpl.aar \
            https://github.com/NooruddinLakhani/ffmpeg-kit-full-gpl/releases/download/v1.0.0/ffmpeg-kit-full-gpl.aar

      - name: 🔧 Patch ffmpeg-kit-react-native build.gradle (use local AAR)
        run: |
          FFMPEG_BUILD_GRADLE="node_modules/ffmpeg-kit-react-native/android/build.gradle"
          # Replace remote AAR dependency with local one
          sed -i "s|implementation 'com.arthenica:ffmpeg-kit-.*'|implementation(name: 'ffmpeg-kit-full-gpl', ext: 'aar')|g" "$FFMPEG_BUILD_GRADLE"
          echo "Patched $FFMPEG_BUILD_GRADLE"

      - name: 🔧 Add flatDir + smart-exception to android/app/build.gradle
        run: |
          APP_GRADLE="android/app/build.gradle"
          # Add flatDir repository
          sed -i '/^android {/a\    repositories {\n        flatDir { dirs "$rootDir/libs" }\n    }' "$APP_GRADLE"
          # Add smart-exception-java dependency
          sed -i '/^dependencies {/a\    implementation '"'"'com.arthenica:smart-exception-java:0.2.1'"'"'' "$APP_GRADLE"
          echo "Patched $APP_GRADLE"

      - name: 🔧 Add flatDir to android/build.gradle allprojects
        run: |
          ROOT_GRADLE="android/build.gradle"
          sed -i '/allprojects {/,/^}/ s|mavenCentral()|mavenCentral()\n        flatDir { dirs "$rootDir/libs" }|' "$ROOT_GRADLE"
          echo "Patched $ROOT_GRADLE"

      - name: 🚀 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleRelease --no-daemon -x lint
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: duarecorder-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
